name: Deploy to MEICaixa BackEnd

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '8.x.x'
    
    - name: Restore dependencies
      run: dotnet restore ./QRefeicao.sln
    
    - name: Build
      run: dotnet build ./QRefeicao.sln -c Release --no-restore
    
    - name: Publish API
      run: dotnet publish ./QRefeicao.API/QRefeicao.API.csproj -c Release --no-build -o ./QRefeicao/QRefeicao.API/publish

    - name: Publish Identity
      run: dotnet publish ./QRefeicao.Identity/QRefeicao.Identity.csproj -c Release --no-build -o ./QRefeicao/QRefeicao.Identity/publish

    - name: Create tarball
      run: tar --no-same-permissions -cvf publish.tar ./QRefeicao
    
    - name: Deploy to QRefeicao API
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: './QRefeicao/QRefeicao.API/publish'
        target: '/var/www/html'
        port: 22

    - name: Deploy to QRefeicao Identity
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: './QRefeicao/QRefeicao.Identity/publish'
        target: '/var/www/html'
        port: 22
    
    - name: Restart service
      uses: appleboy/ssh-action@master
      with:
        host: ${{secrets.VM_HOST}}
        username: ${{secrets.VM_USERNAME}}
        password: ${{secrets.VM_PASSWORD}}
        script: |
          echo "${{ secrets.VM_PASSWORD }}" | sudo -S systemctl restart QRefeicao.API.service
          echo "${{ secrets.VM_PASSWORD }}" | sudo -S systemctl restart QRefeicao.Identity.service
      env:
        VM_PASSWORD: ${{ secrets.VM_PASSWORD }}
